name: 'Terraform CI/CD'

on:
  push:
    branches:
      - main
  pull_request:

# ✅ Prevent parallel runs (avoids state lock issues)
concurrency:
  group: terraform-production
  cancel-in-progress: false

jobs:

  # =========================
  # 🔹 PLAN (PR + Push)
  # =========================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.14.8

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Terraform Init
      run: terraform init -backend-config=backend.tfvars

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Format Check
      run: terraform fmt -check

    # 🔐 Optional (best practice)
    - name: Terraform Lint
      uses: terraform-linters/setup-tflint@v4

    - name: Run TFLint
      run: tflint

    # 🔐 Security scan
    - name: Run tfsec
      uses: aquasecurity/tfsec-action@v1

    # 🔥 Plan with auto unlock + retry
    - name: Terraform Plan (auto unlock + retry)
      id: plan
      run: |
        for i in 1 2 3; do
          echo "Attempt $i: Running terraform plan..."

          terraform plan -out=tfplan 2>error.log && exit 0

          if grep -q "state blob is already locked" error.log; then
            echo "Lock detected. Extracting Lock ID..."

            LOCK_ID=$(grep -oP 'ID:\s+\K[a-z0-9-]+' error.log | head -1)

            echo "Lock ID: $LOCK_ID"

            if [ ! -z "$LOCK_ID" ]; then
              echo "Forcing unlock..."
              terraform force-unlock -force $LOCK_ID
            fi
          fi

          echo "Retrying in 20 seconds..."
          sleep 20
        done

        echo "Terraform plan failed after retries"
        exit 1

    # 📄 Upload plan (for apply job)
    - name: Upload tfplan artifact
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: terraform/tfplan


  # =========================
  # 🔹 APPLY (ONLY MAIN)
  # =========================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.14.8

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Terraform Init
      run: terraform init -backend-config=backend.tfvars

    # 📥 Download plan
    - name: Download tfplan
      uses: actions/download-artifact@v4
      with:
        name: tfplan
        path: terraform/

    # ✅ Apply only if plan exists
    - name: Terraform Apply
      run: terraform apply -auto-approve tfplan
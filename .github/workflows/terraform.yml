name: 'Terraform CI/CD'

on:
  push:
    branches:
      - main
  pull_request:

# ✅ Prevent parallel runs (fixes state lock issue)
concurrency:
  group: terraform-production
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # ✅ Init
    - name: Terraform Init
      run: terraform init -backend-config=backend.tfvars

    # ✅ Validate
    - name: Terraform Validate
      run: terraform validate

    # ✅ Optional: Format check (good practice)
    - name: Terraform Format Check
      run: terraform fmt -check

    # ✅ Retry logic for transient lock issues
    - name: Terraform Plan (with retry)
      run: |
        for i in 1 2 3; do
          terraform plan -out=tfplan && break
          echo "Retrying due to lock..."
          sleep 15
        done

    # ✅ Apply only on main push
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve tfplan